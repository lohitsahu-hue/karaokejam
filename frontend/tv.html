<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaraokeJam TV Display</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --neon-purple: #a78bfa;
            --neon-pink: #f472b6;
            --text-white: #ffffff;
            --text-dim: #888888;
            --gradient-start: #7c3aed;
            --gradient-end: #ec4899;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-white);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Animated background gradient orbs */
        .background-orbs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            filter: blur(60px);
        }

        .orb-purple {
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
            width: 400px;
            height: 400px;
            top: 10%;
            left: 5%;
            animation: drift-purple 20s ease-in-out infinite;
        }

        .orb-pink {
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
            width: 500px;
            height: 500px;
            bottom: 10%;
            right: 5%;
            animation: drift-pink 25s ease-in-out infinite;
        }

        @keyframes drift-purple {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 40px); }
        }

        @keyframes drift-pink {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-40px, -30px); }
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            height: 100%;
            padding: 24px;
            gap: 24px;
        }

        /* Main content area - 70% */
        .main-content {
            flex: 0 0 70%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Now Playing Bar */
        .now-playing {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: rgba(167, 139, 250, 0.08);
            border: 1px solid rgba(167, 139, 250, 0.2);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            min-height: 100px;
        }

        .now-playing.idle {
            display: none;
        }

        .thumbnail {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .now-playing-info {
            flex: 1;
        }

        .now-playing-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-white);
            margin-bottom: 4px;
        }

        .now-playing-artist {
            font-size: 14px;
            color: var(--neon-purple);
            margin-bottom: 4px;
        }

        .now-playing-requester {
            font-size: 12px;
            color: var(--text-dim);
        }

        /* Lyrics Display */
        .lyrics-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
            padding: 40px;
            background: rgba(244, 114, 182, 0.05);
            border: 1px solid rgba(244, 114, 182, 0.15);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .lyrics-section.idle {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 40px;
        }

        .logo {
            font-size: 64px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: pulse-glow 2s ease-in-out infinite;
            text-align: center;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 1; text-shadow: 0 0 20px rgba(167, 139, 250, 0.5); }
            50% { opacity: 0.8; text-shadow: 0 0 40px rgba(244, 114, 182, 0.5); }
        }

        .join-message {
            font-size: 18px;
            color: var(--neon-purple);
            text-align: center;
            font-weight: 600;
        }

        .lyric-line {
            transition: all 0.3s ease;
            text-align: center;
            min-height: 1.2em;
        }

        .lyric-previous {
            font-size: 20px;
            color: var(--text-dim);
            opacity: 0.5;
        }

        .lyric-current {
            font-size: 48px;
            font-weight: 700;
            color: var(--text-white);
            text-shadow: 0 0 20px rgba(167, 139, 250, 0.8), 0 0 40px rgba(244, 114, 182, 0.6);
            animation: line-glow 0.5s ease;
        }

        @keyframes line-glow {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        .lyric-next {
            font-size: 24px;
            color: var(--text-white);
            opacity: 0.6;
        }

        .lyric-roman {
            font-size: 16px;
            color: var(--neon-pink);
            margin-top: 8px;
            font-weight: 500;
            opacity: 0.9;
        }

        /* Progress Bar */
        .progress-container {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
        }

        /* Queue Sidebar - 30% */
        .queue-sidebar {
            flex: 0 0 30%;
            display: flex;
            flex-direction: column;
            background: rgba(167, 139, 250, 0.06);
            border: 1px solid rgba(167, 139, 250, 0.15);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        .queue-header {
            padding: 20px;
            border-bottom: 1px solid rgba(167, 139, 250, 0.15);
            font-size: 18px;
            font-weight: 700;
            color: var(--neon-purple);
        }

        .queue-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .queue-list::-webkit-scrollbar {
            width: 6px;
        }

        .queue-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .queue-list::-webkit-scrollbar-thumb {
            background: rgba(167, 139, 250, 0.3);
            border-radius: 3px;
        }

        .queue-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            transition: all 0.3s ease;
            animation: fade-in 0.3s ease;
        }

        @keyframes fade-in {
            0% { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .queue-item.now-playing {
            background: rgba(244, 114, 182, 0.15);
            border: 2px solid var(--neon-pink);
            box-shadow: 0 0 20px rgba(244, 114, 182, 0.3);
        }

        .queue-item.next-up {
            border: 2px solid var(--neon-purple);
            background: rgba(167, 139, 250, 0.1);
        }

        .queue-position {
            font-size: 20px;
            font-weight: 700;
            color: var(--neon-purple);
            min-width: 30px;
            text-align: center;
        }

        .queue-thumbnail {
            width: 50px;
            height: 50px;
            border-radius: 6px;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .queue-song-info {
            flex: 1;
            min-width: 0;
        }

        .queue-song-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-white);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .queue-requester {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        .queue-status {
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(167, 139, 250, 0.3);
            color: var(--neon-purple);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .queue-status.playing {
            background: rgba(244, 114, 182, 0.3);
            color: var(--neon-pink);
        }

        /* Room Badge */
        .room-badge {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(167, 139, 250, 0.15);
            border: 1px solid rgba(167, 139, 250, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 12px;
            color: var(--neon-purple);
            font-weight: 600;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        /* Up Next Transition Screen */
        .up-next-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 15, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            gap: 40px;
            backdrop-filter: blur(5px);
        }

        .up-next-screen.active {
            display: flex;
            animation: fade-in 0.5s ease;
        }

        .up-next-label {
            font-size: 56px;
            font-weight: 800;
            color: var(--neon-purple);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 30px rgba(167, 139, 250, 0.8);
        }

        .up-next-singer {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(244, 114, 182, 0.6);
        }

        .up-next-song {
            font-size: 32px;
            font-weight: 600;
            color: var(--text-white);
            text-shadow: 0 0 20px rgba(167, 139, 250, 0.5);
        }
    </style>
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-purple"></div>
        <div class="orb orb-pink"></div>
    </div>

    <div class="container">
        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Now Playing Bar -->
            <div class="now-playing idle">
                <div class="thumbnail">🎵</div>
                <div class="now-playing-info">
                    <div class="now-playing-title">No Song Playing</div>
                    <div class="now-playing-artist">Stand by...</div>
                    <div class="now-playing-requester">Waiting for next song</div>
                </div>
            </div>

            <!-- Lyrics Display -->
            <div class="lyrics-section idle">
                <div class="logo">KaraokeJam</div>
                <div class="join-message">Join at <span id="join-url">[loading...]</span></div>
            </div>

            <!-- Progress Bar -->
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
        </div>

        <!-- Queue Sidebar -->
        <div class="queue-sidebar">
            <div class="queue-header">Up Next</div>
            <div class="queue-list">
                <!-- Queue items will be injected here -->
            </div>
        </div>
    </div>

    <!-- Up Next Transition -->
    <div class="up-next-screen">
        <div class="up-next-label">UP NEXT</div>
        <div class="up-next-singer" id="up-next-singer">Singer Name</div>
        <div class="up-next-song" id="up-next-song">Song Title</div>
    </div>

    <!-- Room Badge -->
    <div class="room-badge" id="room-badge">
        Join at <span id="room-code">[loading...]</span>
    </div>

    <script src="/scripts/engine/lyricsEngine.js"></script>
    <script>
        // Configuration
        const roomCode = window.location.pathname.split('/tv/')[1];
        const API_URL = window.location.origin;
        const TRANSITION_DURATION = 5000; // 5 seconds

        // State
        let socket = null;
        let currentSong = null;
        let queue = [];
        let playbackState = {
            isPlaying: false,
            currentTime: 0,
            playbackStartedAt: null,
            offset: 0,
        };
        let lyricsEngine = null;

        // DOM elements
        const nowPlayingBar = document.querySelector('.now-playing');
        const lyricsSection = document.querySelector('.lyrics-section');
        const queueList = document.querySelector('.queue-list');
        const progressBar = document.querySelector('.progress-bar');
        const joinUrl = document.getElementById('join-url');
        const roomBadge = document.getElementById('room-badge');
        const upNextScreen = document.querySelector('.up-next-screen');
        const upNextSinger = document.getElementById('up-next-singer');
        const upNextSong = document.getElementById('up-next-song');

        // Initialize
        function init() {
            // Set up host URL
            const hostUrl = `${window.location.hostname}:${window.location.port || (window.location.protocol === 'https:' ? 443 : 80)}/join/${roomCode}`;
            joinUrl.textContent = hostUrl;
            document.getElementById('room-code').textContent = hostUrl;

            // Initialize Socket.IO
            initSocket();
        }

        function initSocket() {
            socket = io();

            socket.on('connect', () => {
                console.log('Socket connected');
                joinRoom();
            });

            socket.on('room:state', handleRoomState);
            socket.on('queue:updated', handleQueueUpdated);
            socket.on('playback:started', handlePlaybackStarted);
            socket.on('playback:paused', handlePlaybackPaused);
            socket.on('playback:seeked', handlePlaybackSeeked);
            socket.on('playback:controlUpdate', handleControlUpdate);
            socket.on('playback:nextSong', handleNextSong);
            socket.on('playback:queueEmpty', handleQueueEmpty);
        }

        function joinRoom() {
            fetch(`${API_URL}/api/rooms/join`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    code: roomCode,
                    guestName: '📺 TV Display'
                })
            }).then(r => r.json()).then(data => {
                console.log('Joined room:', data);
                socket.emit('room:join', {
                    roomId: data.roomId,
                    guestId: data.guestId,
                    guestName: '📺 TV Display',
                    asHost: false
                });
            }).catch(err => console.error('Join failed:', err));
        }

        function handleRoomState(data) {
            const room = data.room || data;
            queue = room.queue || [];
            const idx = room.currentQueueIdx || 0;
            currentSong = queue[idx] || null;
            playbackState = {
                isPlaying: room.playback?.state === 'playing',
                playbackStartedAt: room.playback?.startedAt || null,
                offset: (room.playback?.offsetSec || 0) * 1000,
            };

            updateUI();
            if (playbackState.isPlaying) startProgressUpdate();
        }

        function handleQueueUpdated(data) {
            queue = data.queue;
            renderQueue();
        }

        function handlePlaybackStarted(data) {
            currentSong = data.currentSong;
            playbackState.isPlaying = true;
            playbackState.playbackStartedAt = data.playback?.startedAt || Date.now();
            playbackState.offset = (data.playback?.offsetSec || 0) * 1000;

            // Initialize lyrics engine
            if (currentSong && currentSong.lrcData) {
                initLyricsEngine(currentSong.lrcData);
            }

            updateUI();
            startProgressUpdate();
        }

        function handlePlaybackPaused(data) {
            playbackState.isPlaying = false;
            playbackState.currentTime = data.currentTime || 0;
        }

        function handlePlaybackSeeked(data) {
            playbackState.currentTime = data.time || 0;
            if (playbackState.isPlaying) {
                playbackState.playbackStartedAt = Date.now();
                playbackState.offset = (data.time || 0) * 1000;
            }
        }

        function handleControlUpdate(data) {
            // Control updates are for key/tempo/lyrics offset — not play state
            // Just update UI if needed
        }

        function handleNextSong(data) {
            currentSong = data.currentSong;
            queue = data.queue || queue;
            renderQueue();
            if (currentSong) {
                showUpNextTransition(currentSong);
            }
        }

        function handleQueueEmpty() {
            currentSong = null;
            playbackState.isPlaying = false;
            updateUI();
        }

        function initLyricsEngine(lyricsText) {
            if (!window.LyricsEngine) {
                console.error('LyricsEngine not loaded');
                return;
            }
            const parsed = window.LyricsEngine.parseLRC(lyricsText);
            lyricsEngine = window.LyricsEngine.processLRC(parsed);
        }

        function updateUI() {
            if (!currentSong || !playbackState.isPlaying) {
                showIdleState();
            } else {
                showPlayingState();
                renderQueue();
            }
        }

        function showIdleState() {
            nowPlayingBar.classList.add('idle');
            lyricsSection.classList.add('idle');
            queueList.innerHTML = '';
        }

        function showPlayingState() {
            nowPlayingBar.classList.remove('idle');
            lyricsSection.classList.remove('idle');

            // Update now playing bar
            document.querySelector('.now-playing-title').textContent = currentSong.title || 'Unknown';
            document.querySelector('.now-playing-artist').textContent = currentSong.artist || 'Unknown Artist';
            document.querySelector('.now-playing-requester').textContent = `Requested by ${currentSong.requestedByName || currentSong.requestedBy || 'Someone'}`;
        }

        function renderQueue() {
            queueList.innerHTML = '';
            queue.forEach((song, index) => {
                const isNowPlaying = index === 0;
                const isNextUp = index === 1;

                const item = document.createElement('div');
                item.className = `queue-item ${isNowPlaying ? 'now-playing' : ''} ${isNextUp ? 'next-up' : ''}`;
                item.innerHTML = `
                    <div class="queue-position">${index + 1}</div>
                    <div class="queue-thumbnail">🎵</div>
                    <div class="queue-song-info">
                        <div class="queue-song-title">${song.title || 'Unknown'}</div>
                        <div class="queue-requester">${song.requestedByName || song.requestedBy || 'Someone'}</div>
                    </div>
                    <div class="queue-status ${isNowPlaying ? 'playing' : ''}">${isNowPlaying ? 'Playing' : 'Ready'}</div>
                `;
                queueList.appendChild(item);
            });
        }

        let _progressFrame = null;
        function startProgressUpdate() {
            if (_progressFrame) cancelAnimationFrame(_progressFrame);

            const updateProgress = () => {
                if (!playbackState.isPlaying || !currentSong) {
                    _progressFrame = null;
                    return;
                }

                const elapsedMs = Date.now() - playbackState.playbackStartedAt;
                playbackState.currentTime = (elapsedMs + (playbackState.offset || 0)) / 1000;

                const duration = currentSong.duration || 180;
                const percentage = Math.min((playbackState.currentTime / duration) * 100, 100);
                progressBar.style.width = percentage + '%';

                updateLyrics();
                _progressFrame = requestAnimationFrame(updateProgress);
            };

            _progressFrame = requestAnimationFrame(updateProgress);
        }

        function updateLyrics() {
            if (!lyricsEngine) return;

            const currentTime = playbackState.currentTime;
            const lineIndex = window.LyricsEngine.findLineIndex(lyricsEngine, currentTime);

            const prevLine = lineIndex > 0 ? lyricsEngine[lineIndex - 1] : null;
            const currLine = lyricsEngine[lineIndex] || null;
            const nextLine = lineIndex < lyricsEngine.length - 1 ? lyricsEngine[lineIndex + 1] : null;

            const lyricsContent = document.querySelector('.lyrics-section');
            if (!lyricsContent.querySelector('.lyric-current')) {
                lyricsContent.innerHTML = `
                    <div class="lyric-line lyric-previous"></div>
                    <div class="lyric-line lyric-current"></div>
                    <div class="lyric-line lyric-next"></div>
                `;
            }

            const previousEl = lyricsContent.querySelector('.lyric-previous');
            const currentEl = lyricsContent.querySelector('.lyric-current');
            const nextEl = lyricsContent.querySelector('.lyric-next');

            previousEl.innerHTML = prevLine ? `<div>${prevLine.text}</div>` : '';
            currentEl.innerHTML = currLine ? `
                <div>${currLine.text}</div>
                ${currLine.roman ? `<div class="lyric-roman">${currLine.roman}</div>` : ''}
            ` : '';
            nextEl.innerHTML = nextLine ? `<div>${nextLine.text}</div>` : '';
        }

        function showUpNextTransition(nextSong) {
            upNextSinger.textContent = nextSong.requestedByName || nextSong.requestedBy || 'Next Singer';
            upNextSong.textContent = nextSong.title || 'Next Song';

            upNextScreen.classList.add('active');

            setTimeout(() => {
                upNextScreen.classList.remove('active');
            }, TRANSITION_DURATION);
        }

        // Start the app
        init();
    </script>
</body>
</html>
