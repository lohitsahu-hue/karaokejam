<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karaoke Party</title>
<link rel="stylesheet" href="/styles/main.css">
</head>
<body>

<!-- ═══ VIEW: Landing / Join ═══ -->
<div id="view-landing" class="view active">
  <div class="landing">
    <h1 class="logo">🎤 Karaoke Party</h1>
    <p class="tagline">Host a karaoke session. Everyone joins from their phone.</p>

    <div class="landing-actions">
      <button class="btn btn-primary btn-lg" id="btn-create-room">Create Room</button>
      <div class="divider">or</div>
      <div class="join-row">
        <input type="text" id="input-room-code" placeholder="Room code (e.g. KRK-4A7B)" maxlength="8" class="input-code">
        <button class="btn btn-secondary" id="btn-join-room">Join</button>
      </div>
    </div>

    <div class="name-row">
      <label>Your name</label>
      <input type="text" id="input-name" placeholder="Enter your name" class="input-name" value="">
    </div>
  </div>
</div>

<!-- ═══ VIEW: Room (Host + Guest) ═══ -->
<div id="view-room" class="view">
  <header class="room-header">
    <div class="room-info">
      <span class="room-code-display" id="room-code-display">---</span>
      <span class="room-host" id="room-host-name"></span>
    </div>
    <div class="room-guests" id="room-guests">0 guests</div>
  </header>

  <!-- Song Search -->
  <div class="search-section">
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search for a song..." class="search-input">
      <button class="btn btn-primary" id="btn-search">Search</button>
    </div>
    <div class="search-results" id="search-results"></div>
  </div>

  <!-- Queue -->
  <div class="queue-section">
    <h2 class="section-title">Queue <span class="queue-count" id="queue-count">0</span></h2>
    <div class="queue-list" id="queue-list">
      <div class="queue-empty">No songs yet — search and add one!</div>
    </div>
  </div>

  <!-- Now Playing (host only) -->
  <div class="now-playing" id="now-playing" style="display:none">
    <div class="np-info">
      <span class="np-label">Now Playing</span>
      <span class="np-title" id="np-title">—</span>
      <span class="np-artist" id="np-artist"></span>
    </div>
    <div class="np-controls">
      <button class="btn btn-sm" id="btn-open-mixer">Open Mixer</button>
      <button class="btn btn-sm" id="btn-next-song">Skip ⏭</button>
    </div>
  </div>
</div>

<!-- ═══ VIEW: Mixer (Host — embedded from prototype) ═══ -->
<div id="view-mixer" class="view">
  <button class="btn-back" id="btn-back-to-room">← Back to Room</button>
  <div id="mixer-container">
    <!-- Mixer UI built dynamically by mixerView.js -->
  </div>
</div>

<!-- ═══ Full-Screen Cinematic Lyrics Overlay ═══ -->
<div class="lyrics-overlay" id="lyrics-overlay">
  <div class="lo-header">
    <div class="lo-song-info">
      <span class="lo-song-title" id="lo-title"></span>
      <span class="lo-song-artist" id="lo-artist"></span>
    </div>
    <button class="lo-close" id="lo-close">✕</button>
  </div>

  <div class="lo-lines">
    <div class="lo-line prev" id="lo-prev"><div class="lo-text"></div><div class="lo-roman"></div></div>
    <div class="lo-line curr" id="lo-curr"><div class="lo-text"></div><div class="lo-roman"></div></div>
    <div class="lo-line next" id="lo-next"><div class="lo-text"></div><div class="lo-roman"></div></div>
  </div>

  <div class="lo-controls">
    <div class="lo-transport">
      <button class="btn btn-sm" id="lo-restart">⏮</button>
      <button class="btn btn-primary" id="lo-playpause">⏸</button>
      <button class="btn btn-sm" id="lo-skip">⏭</button>
    </div>
    <div class="lo-progress-wrap" id="lo-progress-wrap">
      <div class="lo-progress-bar" id="lo-progress-bar"></div>
    </div>
    <div class="lo-time" id="lo-time">0:00 / 0:00</div>
    <div class="lo-sync">
      <button class="btn btn-sm" id="lo-sync-minus">-0.5s</button>
      <span class="lo-sync-value" id="lo-sync-value">Sync: 0.0s</span>
      <button class="btn btn-sm" id="lo-sync-plus">+0.5s</button>
      <button class="btn btn-sm" id="lo-sync-auto">Auto</button>
      <button class="btn btn-sm" id="lo-sync-reset">Reset</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/scripts/api/client.js"></script>
<script src="/scripts/api/socketClient.js"></script>
<script src="/scripts/engine/audioEngine.js"></script>
<script src="/scripts/engine/lyricsEngine.js"></script>
<script src="/scripts/engine/stemLoader.js"></script>
<script src="/scripts/views/roomView.js"></script>
<script src="/scripts/views/searchView.js"></script>
<script src="/scripts/views/queueView.js"></script>
<script src="/scripts/views/mixerView.js"></script>
<script src="/scripts/app.js"></script>
</body>
</html>
